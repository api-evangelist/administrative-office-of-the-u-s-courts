naftiko: 1.0.0-alpha2
info:
  label: Administrative Office of the U.S. Courts PACER Case Locator API — Cases
  description: 'Administrative Office of the U.S. Courts PACER Case Locator API — Cases. 1 operations. Lead operation: Administrative
    Office of the U.S. Courts Search for cases. Self-contained Naftiko capability covering one Administrative Office Of The
    U S Courts business surface.'
  tags:
  - Administrative Office Of The U S Courts
  - Cases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADMINISTRATIVE_OFFICE_OF_THE_U_S_COURTS_API_KEY: ADMINISTRATIVE_OFFICE_OF_THE_U_S_COURTS_API_KEY
capability:
  consumes:
  - type: http
    namespace: pacer-case-locator-pcl-cases
    baseUri: https://qa-pcl.uscourts.gov/pcl-public-api/rest
    description: Administrative Office of the U.S. Courts PACER Case Locator API — Cases business capability. Self-contained,
      no shared references.
    resources:
    - name: cases-find
      path: /cases/find
      operations:
      - name: post
        method: POST
        description: Administrative Office of the U.S. Courts Search for cases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: pacer-case-locator-pcl-cases-rest
    port: 8080
    description: REST adapter for Administrative Office of the U.S. Courts PACER Case Locator API — Cases. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cases/find
      name: cases-find
      description: REST surface for cases-find.
      operations:
      - method: POST
        name: post
        description: Administrative Office of the U.S. Courts Search for cases
        call: pacer-case-locator-pcl-cases.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pacer-case-locator-pcl-cases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Administrative Office of the U.S. Courts PACER Case Locator API — Cases. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: administrative-office-u-s-courts-search
      description: Administrative Office of the U.S. Courts Search for cases
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: pacer-case-locator-pcl-cases.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
