name: Administrative Office of the U.S. Courts
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Courts
  - Federal Government
  - Legal
description: >-
  The Administrative Office of the United States Courts is the administrative
  agency of the United States federal court system, established in 1939. It
  provides legislative, administrative, legal, financial, management, program,
  and information technology support services to the federal courts.
created: '2024-11-20'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: administrative-office-of-the-u-s-courts:pacer-authentication-api
    name: PACER Authentication API
    tags:
      - Authentication
      - Courts
    humanURL: https://pacer.uscourts.gov/help/pacer/pacer-authentication-api-user-guide
    properties:
      - url: https://pacer.uscourts.gov/help/pacer/pacer-authentication-api-user-guide
        type: Documentation
    description: >-
      The PACER Authentication API allows users to authenticate automatically
      and without a user interface, facilitating access for automated systems
      to court records.
  - aid: administrative-office-of-the-u-s-courts:pacer-case-locator-pcl-api
    name: PACER Case Locator (PCL) API
    tags:
      - Courts
      - Legal
    humanURL: https://pacer.uscourts.gov/help/pacer/pacer-case-locator-pcl-api-user-guide
    properties:
      - url: https://pacer.uscourts.gov/help/pacer/pacer-case-locator-pcl-api-user-guide
        type: Documentation
    description: >-
      The PACER Case Locator is a nationwide index of federal court cases. The
      public PCL API allows users to programmatically search for federal cases
      or associated parties.
